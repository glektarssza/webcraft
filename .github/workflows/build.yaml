# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build
on:
  push:
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      build-config:
        description: >
          The configuration to build for.

          Valid options are:
           * dev
           * prod
        type: string
        required: true
    outputs:
      artifact-id:
        description: >
          The ID of the artifact generated by this workflow.
        value: ${{jobs.build.outputs.artifact-id}}
    secrets:
      github-token:
        description: >
          The token to use for making authenticated requests to the GitHub APIs.
        required: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        build-config:
          - dev
          - prod
        exclude:
          - build-config: ${{inputs.build-config == 'dev' && 'prod' || ''}}
          - build-config: ${{inputs.build-config == 'prod' && 'dev' || ''}}
    outputs:
      artifact-id: ${{steps.upload-artifacts.outputs.artifact-id}}
    steps:
      - id: checkout-repository
        name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{secrets.github-token || secrets.GITHUB_TOKEN}}
          lfs: true
      - id: setup-pnpm
        name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false
      - id: setup-nodejs
        name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          token: ${{secrets.github-token || secrets.GITHUB_TOKEN}}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - id: get-pnpm-store-directory
        name: Get pnpm store directory
        shell: bash
        run: |
          echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - id: setup-pnpm-cache
        name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{steps.get-pnpm-store-directory.outputs.PNPM_STORE_PATH}}
          key: ${{runner.os}}-pnpm-store-${{hashFiles('pnpm-lock.yaml')}}
          restore-keys: |
            ${{runner.os}}-pnpm-store-
      - id: install-dependencies
        name: Install dependencies
        run: pnpm -r install
      - id: build
        name: Build
        run: pnpm -r run build:${{matrix.build-config}}
      - id: upload-artifacts
        name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: ./app/dist/${{matrix.build-config}}/
          name: dist-${{matrix.build-config}}
          if-no-files-found: error
